checkpoint_freq: 500
env:
  ambient_range:
  - 20.0
  - 30.0
  initial_temp_range:
  - 40.0
  - 60.0
  max_steps: 300
  power_range:
  - 100.0
  - 300.0
  reward_weights:
    energy: 0.1
    headroom: 2.0
    oscillation: 1.0
    thermal: 10.0
  temp_critical: 90.0
  temp_target: 75.0
  temp_warning: 80.0
normalize_obs: true
normalize_reward: true
output_dir: runs/rl
run_name: sac_pinn_hybrid
sac:
  batch_size: 256
  buffer_size: 100000
  gamma: 0.99
  gradient_steps: 1
  learning_rate: 0.0003
  learning_starts: 1000
  tau: 0.005
  train_freq: 1
safety:
  enable_shield: true
  fan_max: 100.0
  fan_min: 20.0
  temp_max: 85.0
surrogate:
  device: cpu
  feature_columns_path: results/validation/rf_test/feature_columns.json
  input_mean: null
  input_std: null
  model_path: models/best_pinn_model.pt
  output_mean: null
  output_std: null
  pinn_config: null
  scalers_path: models/scalers.json
  strict_features: true
  type: pinn
total_timesteps: 2000
use_safety: true
