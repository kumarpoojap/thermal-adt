checkpoint_freq: 500
env:
  ambient_range:
  - 20.0
  - 30.0
  initial_temp_range:
  - 40.0
  - 60.0
  max_steps: 300
  power_range:
  - 100.0
  - 300.0
  reward_weights:
    energy: 0.1
    headroom: 2.0
    oscillation: 1.0
    thermal: 10.0
  temp_critical: 90.0
  temp_target: 75.0
  temp_warning: 80.0
normalize_obs: true
normalize_reward: true
output_dir: runs/rl
run_name: sac_rc_baseline
sac:
  batch_size: 256
  buffer_size: 100000
  gamma: 0.99
  gradient_steps: 1
  learning_rate: 0.0003
  learning_starts: 1000
  tau: 0.005
  train_freq: 1
safety:
  enable_shield: true
  fan_max: 100.0
  fan_min: 20.0
  temp_max: 85.0
surrogate:
  cooling_effectiveness: -0.03
  dt: 1.0
  heat_transfer_coeff: 0.05
  power_to_heat: 0.01
  temp_max: 95.0
  temp_min: 30.0
  thermal_capacity: 100.0
  type: rc
total_timesteps: 2000
use_safety: true
