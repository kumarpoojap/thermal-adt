# SAC training with RC+NN hybrid surrogate adapter
run_name: sac_rcnn_hybrid
output_dir: runs/rl

# Surrogate configuration
surrogate:
  type: rcnn
  # Point to the bundle saved by scripts/training/train_rc_nn.py
  bundle_path: models/rc_nn_hybrid.pkl
  device: cpu  # or cuda

# Environment configuration
env:
  max_steps: 300
  temp_warning: 80.0
  temp_critical: 90.0
  temp_target: 65.0
  initial_temp_range: [60.0, 80.0]
  ambient_range: [20.0, 30.0]
  power_range: [100.0, 300.0]
  reward_weights:
    thermal: 12.0
    energy: 0.4
    oscillation: 2.5
    headroom: 0.05

# Safety wrapper
use_safety: true
safety:
  temp_max: 85.0
  fan_min: 20.0
  fan_max: 100.0
  enable_shield: true

# SAC hyperparameters
sac:
  learning_rate: 2.0e-4
  buffer_size: 100000
  learning_starts: 1000
  batch_size: 512
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1

# Training configuration
total_timesteps: 250000
checkpoint_freq: 10000
normalize_obs: true
normalize_reward: true
