# GPU Thermal Forecasting - Hybrid PINN (curriculum) Configuration

# This config matches the expected structure of scripts/training/train_pinn.py
# and is a faithful port of the Digital-twin1 curriculum-style config.

data:
  parquet_path: "data/synthetic/thermal_dataset.parquet"
  spec_path: "configs/data/gpu_thermal_spec.json"
  feature_columns_path: "results/validation/rf_test/feature_columns.json"

  # Feature engineering
  features:
    base_cols: ["workload_intensity", "gpu_power_w", "ambient_temp_c", "fan_speed_pct"]
    lags: [1, 3, 5]
    roll_windows: []
    winsorize: true
    winsor_quantiles: [0.01, 0.99]
    low_var_threshold: 1.0e-8

  # k-ahead prediction
  k_ahead: 10
  cadence_seconds: 1.0

  # Splits (time-based)
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15

  # Target normalization (TRAIN only)
  normalize_targets: true

teacher:
  enabled: true
  model_path: "models/rf_teacher_validation.pkl"  # overridden in Colab to Drive path
  cache_dir: "artifacts/teacher_cache_gpu"        # overridden in Colab to Drive path
  use_cache: true

model:
  hidden_dims: [64, 64, 64]
  activation: "silu"
  dropout: 0.1

  time_embedding:
    enabled: false
    method: "sinusoidal"
    dim: 16
    n_freqs: 8

  physics_head:
    enabled: true

training:
  seed: 42
  device: "cuda"

  lr_initial: 0.002
  lr_final: 0.0005
  weight_decay: 1.0e-5

  batch_size: 64
  num_workers: 0

  early_stopping:
    enabled: true
    patience: 15

  curriculum:
    phase1:
      name: "stabilize"
      epochs: 30
      loss_weights:
        data: 1.0
        teacher: 0.2
        physics: 0.0
        monotonic: 0.0
        smoothness: 0.05

    phase2:
      name: "physics_on"
      epochs: 40
      loss_weights:
        data: 1.0
        teacher: 0.1
        physics: 0.0001
        delta_bound: 0.01
        monotonic: 0.05
        smoothness: 0.05

    phase3:
      name: "control_ready"
      epochs: 30
      loss_weights:
        data: 1.0
        teacher: 0.1
        physics: 0.0002
        delta_bound: 0.02
        monotonic: 0.05
        smoothness: 0.05

losses:
  physics:
    window_size: 10
    use_load_proxy: true
    supply_col: "ambient_temp_c"
    actuator_col: "fan_speed_pct"
    load_proxy_col: "gpu_power_w"

  delta_bound:
    max_delta_c: 6.0

  monotonic:
    actuator_col: "fan_speed_pct"
    epsilon: 0.01
    penalty_type: "relu"

  smoothness:
    order: 1

output:
  artifacts_dir: "artifacts"
  metrics_dir: "artifacts/metrics_gpu"
  plots_dir: "artifacts/plots_gpu"
  logs_dir: "artifacts/logs_gpu"
  checkpoint_dir: "artifacts/checkpoints_gpu"

  save_best: true
  save_last: true

  log_interval: 10
  val_interval: 1

dev_run:
  enabled: false
  max_samples: 1000
  max_epochs: 2
